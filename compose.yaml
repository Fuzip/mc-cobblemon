services:
  mc:
    image: itzg/minecraft-server:java21
    tty: true
    stdin_open: true
    ports:
      - "25565:25565"
    depends_on:
      mc-restore-backup:
        condition: service_completed_successfully
    environment:
      EULA: "TRUE"
      TYPE: "MODRINTH"
      VERSION: "1.21.1"
      # Modpack
      MODRINTH_MODPACK: cobblemon-fabric
      # Mods
      MODRINTH_PROJECTS: |
        architectury-api:13.0.8+fabric
        cardinal-components-api:6.1.3
        cobbledollars:2.0.0+Beta-5.1
        cobblemon-additions:4.3.0
        cobblemon-badgebox:1.3.0
        cobblemon-capture-xp:1.7.3-fabric-1.3.0
        cobblemon-cobblestats:1.9.2+1.21.1
        cobblemon-playerxp:1.0.8+1.21.1
        cobblemon-pokemon-badges:0.1.1
        cobblemon-pokenav:2.3.3
        cobblemon-spawn-notification:1.7.3-fabric-2.3.0
        cobblemon-tim-core:1.7.3-fabric-1.32.0
        cobblemon-trainer-structures:1.6.1
        cobblemonmovedex:1.2
        cobblemonraiddens:0.10.1+1.21.1
        essential-commands:0.35.2-mc1.21
        fabric-api:0.116.10+1.21.1
        fix-cobblemon-pokemon-experience:1.1.1+1.21.1-fabric
        forge-config-api-port:v21.1.6-1.21.1-Fabric
        fusion-connected-textures:1.2.12-fabric-mc1.21
        geckolib:4.8.4
        glassential-renewed:3.2.5
        jade:15.10.5+fabric
        rctapi:0.15.2-beta
        rctmod:0.18.1-beta
        simpletms-tms-and-trs-for-cobblemon:2.3.3
        sophisticated-backpacks-(unoffical-fabric-port):1.21.1-3.23.4.3.106
        sophisticated-core-(unofficial-fabric-port):1.21.1-1.2.9.21.168
        sophisticated-storage-(unofficial-fabric-port):1.21.1-1.3.7.9.139
        treechop:0.19.3a
        trinkets:3.10.0
        vanilla-permissions:0.3.3+1.21.1
        waystones:21.1.32+fabric-1.21.1
      MODRINTH_DOWNLOAD_DEPENDENCIES: "none"
      # Memory
      INIT_MEMORY: "4G"
      MAX_MEMORY: "8G"
      # Server properties
      DIFFICULTY: "normal"
      VIEW_DISTANCE: "8"
      SIMULATION_DISTANCE: "6"
      MAX_PLAYERS: "10"
      MOTD: "Cobblemon Minecraft server of Fuzip"
      PVP: "FALSE"
    restart: "unless-stopped"
    volumes:
      - ./data:/data

  # "init" container for mc to restore the data volume when empty
  mc-restore-backup:
    # Same image as mc, but any base image with bash and tar will work
    image: itzg/mc-backup
    restart: "no"
    entrypoint: restore-tar-backup
    volumes:
    # Must be same mount as mc service, needs to be writable
    - ./data:/data
    # Must be same mount as backups service, but can be read-only
    - ./backups:/backups:ro

  mc-backup:
    image: itzg/mc-backup
    depends_on:
      mc:
        condition: service_healthy
    environment:
      BACKUP_INTERVAL: "1h"
      RCON_HOST: mc
      # since this service waits for mc to be healthy, no initial delay is needed
      INITIAL_DELAY: 0
      BACKUP_ON_STARTUP: true
    volumes:
      - ./data:/data:ro
      - ./backups:/backups

  mc-discord-notifier:
    build:
      context: ./notifier
      dockerfile: Dockerfile
    depends_on:
      mc:
        condition: service_healthy
    environment:
      DISCORD_BOT_TOKEN: "${DISCORD_BOT_TOKEN}"
      DISCORD_USER_IDS: "${DISCORD_USER_IDS}"
    restart: "no"
    stop_grace_period: 30s
